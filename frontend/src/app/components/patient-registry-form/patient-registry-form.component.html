<div class="modal-overlay">
  <div class="glass-panel" style="width: 500px; max-width: 100%; margin: auto; max-height: min-content; box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px var(--glass-glow);">
    <div class="card-header" style="justify-content: space-between;">
      <h2 style="display: flex; align-items: center; gap: 0.5rem;">
        <lucide-icon [name]="UserIcon" [size]="20" class="text-primary"></lucide-icon> Ajouter Patient
      </h2>
      <button (click)="closeForm.emit()" style="background: transparent; padding: 0.5rem; border: none; cursor: pointer;">
        <lucide-icon [name]="XIcon" [size]="20" class="text-muted"></lucide-icon>
      </button>
    </div>
    <div class="card-body">
      <form (submit)="handleSubmit($event)" style="display: flex; flex-direction: column; gap: 1rem;">
        
        <!-- Prénom & Nom -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500;">Prénom *</label>
            <input type="text" [(ngModel)]="formData.prenom" name="prenom" required autoComplete="off" />
          </div>
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500;">Nom *</label>
            <input type="text" [(ngModel)]="formData.nom" name="nom" required autoComplete="off" />
          </div>
        </div>

        <!-- Date Naissance & Genre -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500;">Date de Naissance</label>
            <input type="date" [(ngModel)]="formData.date_naissance" name="date_naissance" />
          </div>
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500;">Genre</label>
            <select [(ngModel)]="formData.genre" name="genre">
              <option value="M">M</option>
              <option value="F">F</option>
            </select>
          </div>
        </div>

        <!-- Téléphone & Poids -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500;">Téléphone</label>
            <input type="tel" [(ngModel)]="formData.tel" name="tel" autoComplete="off" />
          </div>
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500;">Poids (kg)</label>
            <input type="number" step="0.1" [(ngModel)]="formData.poids" name="poids" />
          </div>
        </div>

        <!-- Taille & FC -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500;">Taille (cm)</label>
            <input type="number" step="0.1" [(ngModel)]="formData.taille" name="taille" />
          </div>
          <div class="form-group">
            <label style="display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500;">FC (bpm)</label>
            <input type="number" [(ngModel)]="formData.FC" name="FC" />
          </div>
        </div>

        <!-- Glycémie -->
        <div class="form-group">
          <label style="display: block; margin-bottom: 0.4rem; font-size: 0.85rem; font-weight: 500;">Glycémie (g/L)</label>
          <input type="number" step="0.01" [(ngModel)]="formData.glycemie" name="glycemie" />
        </div>

        <div *ngIf="error" style="color: var(--danger); font-size: 0.85rem; padding: 0.5rem; background: rgba(239, 68, 68, 0.1); border-radius: 4px; border-left: 3px solid var(--danger);">
          {{ error }}
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem;">
          <button type="button" (click)="closeForm.emit()" class="btn-secondary" style="background: transparent; border: 1px solid var(--glass-border); color: var(--text-muted);">
            Annuler
          </button>
          <button type="submit" [disabled]="loading">
            <lucide-icon [name]="SaveIcon" [size]="18"></lucide-icon> {{ loading ? 'Enregistrement...' : 'Valider' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
